# Continuous integration for the Doc Assistant.
#
# Everything runs inside the production Docker image — same artifact a
# developer brings up locally with `docker compose up`. No host-Python
# steps. Matches the contract spelled out in CLAUDE.md ("Docker is the
# only supported run path") and T070 in
# specs/001-doc-assistant-rag/tasks.md.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Test env. Provider keys are stubbed; everything is mocked.
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          LLM_PROVIDER=anthropic
          EMBEDDING_PROVIDER=local
          ANTHROPIC_API_KEY=ci-fake-key
          OPENAI_API_KEY=ci-fake-key
          CHUNK_SIZE=500
          CHUNK_OVERLAP=50
          TOP_K_RESULTS=5
          MAX_UPLOAD_BYTES=26214400
          CHROMA_PERSIST_DIR=./chroma_data
          UPLOAD_TMP_DIR=./uploads_tmp
          RETRY_BUDGET_SECONDS=5.0
          RETRY_ATTEMPTS=3
          RETRY_MAX_WAIT=2.0
          EOF

      - name: Build image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: doc-assistant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint (ruff)
        run: docker run --rm doc-assistant:ci ruff check .

      - name: Type check (mypy --strict)
        run: docker run --rm doc-assistant:ci mypy src

      - name: Tests + coverage gate
        run: |
          docker run --rm \
            --env-file .env \
            doc-assistant:ci \
            pytest --cov=src --cov-fail-under=80 --cov-report=term-missing

      # Performance smoke is opt-in (heavy embeddings + chromadb writes).
      # Runs only on push to main, never on every PR.
      - name: Performance smoke (nightly)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm \
            --env-file .env \
            doc-assistant:ci \
            pytest -m slow --no-cov
